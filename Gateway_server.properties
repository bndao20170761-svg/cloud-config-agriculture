# Activation de la découverte automatique des routes via Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route pour Agriculture_User - Authentification
spring.cloud.gateway.routes[0].id=agriculture-auth-service
spring.cloud.gateway.routes[0].uri=lb://Agriculture_User
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Route pour Agriculture_User - Gestion des utilisateurs
spring.cloud.gateway.routes[1].id=agriculture-user-service
spring.cloud.gateway.routes[1].uri=lb://Agriculture_User
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**

# Route pour Agriculture_User - Culture
spring.cloud.gateway.routes[2].id=agriculture-culture-service
spring.cloud.gateway.routes[2].uri=lb://Agriculture_User
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cultures/**

# Route pour Agriculture_User - Parcelles
spring.cloud.gateway.routes[3].id=agriculture-parcelle-service
spring.cloud.gateway.routes[3].uri=lb://Agriculture_User
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/parcelles/**

# Route pour Agriculture_User - Récoltes
spring.cloud.gateway.routes[4].id=agriculture-recolte-service
spring.cloud.gateway.routes[4].uri=lb://Agriculture_User
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/recoltes/**

# Configuration CORS pour Gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# Logging pour déboguer les routes
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=INFO
