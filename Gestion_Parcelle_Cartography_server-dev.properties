spring.application.name=Gestion_Parcelle_Cartography_server
server.port=8081

# Désactiver temporairement la vérification stricte du Config Server si vous testez sans lui
spring.cloud.config.enabled=true
spring.cloud.config.import-check.enabled=false

# Configuration base de données pour les parcelles
spring.datasource.url=jdbc:mysql://localhost:3306/parcelle_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuration Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

