spring.application.name=Gestion_IntelligenceArficielle_Prediction_server
server.port=8095

# Config Server - désactivé pour le démarrage local
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Base de données
spring.datasource.url=jdbc:mysql://localhost:3306/agri_intelligent?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Service IA Python (API Flask)
ai.service.url=http://localhost:5000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=false

# Logging
logging.level.agri.inov.sn=DEBUG
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
