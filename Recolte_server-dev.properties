spring.application.name=gestion-recolte-server
server.port=8072
# Development datasource configuration for local startup
spring.datasource.url=jdbc:mysql://localhost:3306/recolte_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
logging.level.org.springframework.security=DEBUG
# Enable H2 in-memory fallback when no MySQL database is available
spring.datasource.hikari.maximum-pool-size=5

# Local Eureka settings (if running locally)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

